<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ירון אמיר – מערכת שמאות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0B0F1A;--surface:#131929;--card:#1A2236;--border:#253047;--border2:#2E3D5A;--text:#E8EDF5;--muted:#6B7A9A;--subtle:#3D4F6E;--blue:#3B82F6;--red:#EF4444;--green:#10B981;--amber:#F59E0B;--accent:#F59E0B;--accent2:#D97706;--r4:4px;--r8:8px;--r12:12px;--r16:16px;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
input,select,textarea,button{font-family:inherit;font-size:inherit;}
input,select,textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:9px 12px;color:var(--text);width:100%;outline:none;transition:border-color .15s;}
input:focus,select:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:vertical;min-height:72px;}
button{cursor:pointer;border:none;border-radius:var(--r8);transition:.15s;}
select option{background:var(--card);}
.hidden{display:none!important;}
#screenDash{display:flex;flex-direction:column;min-height:100vh;}
#screenForm{display:none;flex-direction:column;min-height:100vh;}
#screenReport{display:none;background:#F4F6FA;min-height:100vh;color:#111;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.topbar-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;}
.topbar-logo .badge{background:linear-gradient(135deg,var(--amber),var(--accent2));color:#000;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:900;}
.btn{padding:8px 16px;font-weight:700;border-radius:var(--r8);font-size:13px;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:var(--accent);color:#000;}.btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:var(--border);color:var(--text);}.btn-secondary:hover{background:var(--border2);}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}.btn-ghost:hover{background:var(--surface);color:var(--text);}
.btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}.btn-danger:hover{background:rgba(239,68,68,.25);}
.btn-sm{padding:6px 12px;font-size:12px;}.btn-xs{padding:4px 8px;font-size:11px;}.btn:disabled{opacity:.4;cursor:default;}
.btn-icon{padding:7px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--r8);}.btn-icon:hover{background:var(--surface);color:var(--text);}
.dash-header{background:linear-gradient(135deg,#131929 0%,#0d1a2e 100%);border-bottom:1px solid var(--border);padding:32px 32px 24px;}
.dash-title{font-size:24px;font-weight:900;margin-bottom:4px;}.dash-sub{color:var(--muted);font-size:13px;}
.dash-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-top:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:16px;display:flex;flex-direction:column;gap:4px;}
.stat-num{font-size:28px;font-weight:900;line-height:1;}.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.stat-blue .stat-num{color:var(--blue);}.stat-red .stat-num{color:var(--red);}.stat-green .stat-num{color:var(--green);}.stat-amber .stat-num{color:var(--amber);}
.dash-body{padding:24px 32px;flex:1;}
.dash-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.dash-search{flex:1;min-width:200px;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:var(--r8);padding:9px 14px;color:var(--text);font-size:13px;}
.dash-search:focus{border-color:var(--blue);outline:none;}
.filter-tab{padding:7px 14px;border-radius:var(--r8);font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--muted);border:1px solid transparent;}
.filter-tab.active{background:var(--card);color:var(--text);border-color:var(--border);}
.cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.case-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r16);padding:20px;cursor:pointer;transition:border-color .2s,transform .1s;position:relative;overflow:hidden;}
.case-card::before{content:'';position:absolute;top:0;right:0;width:4px;height:100%;background:var(--mode-color,var(--border));}
.case-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.case-name{font-size:15px;font-weight:800;line-height:1.2;}
.case-mode-badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;text-transform:uppercase;background:var(--mode-bg);color:var(--mode-color);white-space:nowrap;}
.case-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0;}
.case-meta-item{font-size:11px;color:var(--muted);}.case-meta-item strong{display:block;color:var(--text);font-size:12px;font-weight:600;}
.cpb{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.cpb-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .3s;}
.cpb-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}
.case-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:10px;}
.case-empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted);}
.case-empty-icon{font-size:48px;margin-bottom:12px;}.case-empty-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;}
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r16);width:100%;max-width:520px;padding:28px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:20px;font-weight:900;margin-bottom:4px;}.modal-sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
.mode-select-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.mode-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r12);padding:16px;text-align:center;cursor:pointer;transition:.15s;}
.mode-card:hover{border-color:var(--border2);background:var(--card);}
.mode-card.selected{border-color:var(--mode-c,var(--accent));background:var(--mode-bg2,rgba(245,158,11,.08));}
.mode-card-icon{font-size:28px;margin-bottom:8px;}.mode-card-label{font-size:12px;font-weight:800;}.mode-card-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.field{margin-bottom:14px;}.label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.form-topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.form-topbar-left,.form-topbar-right{display:flex;align-items:center;gap:8px;}
.case-title-bar{font-weight:800;font-size:14px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mode-pip{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:900;}
.prog-wrap{display:flex;align-items:center;gap:8px;}
.prog-bar{width:72px;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);transition:width .3s;}
.prog-pct{font-size:10px;color:var(--muted);font-weight:700;}
.form-layout{display:flex;flex:1;overflow:hidden;}
.form-sidebar{width:220px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;padding:12px 0;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;border-right:3px solid transparent;transition:.12s;}
.nav-item:hover{background:var(--card);}.nav-item.active{background:var(--card);border-right-color:var(--accent);}
.ni{font-size:16px;width:20px;text-align:center;}.nt{font-size:12px;font-weight:700;}.ns{font-size:10px;color:var(--muted);}
.form-main{flex:1;overflow-y:auto;padding:24px;}
.card-header{margin-bottom:20px;}.card-header h2{font-size:20px;font-weight:900;}.card-header p{font-size:12px;color:var(--muted);margin-top:3px;}
.card-body{background:var(--card);border:1px solid var(--border);border-radius:var(--r16);padding:24px;}
.card-nav{display:flex;justify-content:space-between;margin-top:16px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.span2{grid-column:span 2;}.span3{grid-column:span 3;}
.divider{height:1px;background:var(--border);margin:12px 0;grid-column:1/-1;}
.note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:var(--r8);padding:10px 14px;font-size:12px;color:#93C5FD;margin-top:8px;}
.note-warn{background:rgba(245,158,11,.08);border-color:rgba(245,158,11,.25);color:#FCD34D;}
.note-green{background:rgba(16,185,129,.08);border-color:rgba(16,185,129,.2);color:#6EE7B7;}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:10px;display:block;}
.pill-group{display:flex;flex-wrap:wrap;gap:6px;}
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.12s;}
.pill:hover{border-color:var(--border2);color:var(--text);}
.pill.on{background:rgba(59,130,246,.15);border-color:var(--blue);color:#93C5FD;}
.pill.on-amber{background:rgba(245,158,11,.15);border-color:var(--amber);color:#FCD34D;}
.pill.on-green{background:rgba(16,185,129,.15);border-color:var(--green);color:#6EE7B7;}
.chip{padding:6px 12px;border-radius:var(--r8);font-size:12px;font-weight:700;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.12s;}
.chip:hover{border-color:var(--border2);color:var(--text);}.chip.on{background:rgba(245,158,11,.12);border-color:var(--amber);color:var(--amber);}
.event-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.event-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--r12);padding:14px 10px;text-align:center;cursor:pointer;transition:.15s;}
.event-card:hover{border-color:var(--border2);}.event-card.selected{border-color:var(--amber);background:rgba(245,158,11,.08);}
.ei{font-size:22px;margin-bottom:6px;}.el{font-size:11px;font-weight:700;}
.area-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:16px;margin-bottom:10px;}
.area-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.area-title{font-size:13px;font-weight:800;}
.area-sqm{width:70px;padding:5px 8px;font-size:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r8);color:var(--text);}
.sign-btn{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--card);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:.1s;margin:2px;}
.sign-btn.on{background:rgba(59,130,246,.15);border-color:var(--blue);color:#93C5FD;}
.boq-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);padding:16px;margin-bottom:14px;}
.boq-section-title{font-size:12px;font-weight:800;padding:4px 12px;border-radius:20px;display:inline-block;}
.boq-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.boq-table th{text-align:right;padding:6px 8px;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.boq-table td{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.03);}
.boq-table tr:last-child td{border-bottom:none;}
.boq-input{background:transparent;border:1px solid transparent;border-radius:4px;padding:4px 6px;color:var(--text);font-size:12px;width:100%;}
.boq-input:focus{border-color:var(--blue);background:var(--card);outline:none;}.boq-input.num{text-align:left;}
.boq-subtotal td{font-weight:800;color:var(--amber);background:rgba(245,158,11,.05);border-top:1px solid rgba(245,158,11,.2)!important;}
.boq-grand{background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:var(--r12);padding:16px;margin-top:12px;}
.grand-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.grand-row+.grand-row{border-top:1px solid var(--border);}
.grand-row.final{padding-top:10px;margin-top:4px;}
.grand-row.final span:first-child{font-size:15px;font-weight:800;}.grand-row.final span:last-child{font-size:22px;font-weight:900;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r12);margin-bottom:10px;overflow:hidden;}
.sc-head{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;transition:.12s;}
.sc-head:hover{background:var(--card);}.sc-title{font-size:13px;font-weight:700;}
.sc-toggle{font-size:11px;color:var(--muted);transition:transform .2s;}
.sc.collapsed .sc-toggle{transform:rotate(-90deg);}.sc.collapsed .sc-body{display:none;}
.sc-body{padding:14px 16px;}
.preview-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--r8);padding:12px 14px;}
.pb-label{font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;margin-bottom:5px;}
.pb-text{font-size:12px;color:#9CA3AF;line-height:1.8;white-space:pre-wrap;}
.under-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--r8);font-size:12px;font-weight:700;margin-top:6px;}
.under-ok{background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.under-warn{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.expl-item{font-size:12px;color:#D1D5DB;line-height:1.9;}.expl-item b{color:var(--amber);}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:10px;}
.photo-thumb{position:relative;border-radius:var(--r8);overflow:hidden;background:var(--surface);border:1px solid var(--border);aspect-ratio:4/3;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-del{position:absolute;top:5px;left:5px;background:rgba(0,0,0,.65);border:none;color:#fff;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;}
.photo-add{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:var(--r8);border:2px dashed var(--border);padding:18px;cursor:pointer;font-size:11px;color:var(--muted);gap:5px;transition:.15s;aspect-ratio:4/3;}
.photo-add:hover{border-color:var(--amber);color:var(--amber);}
.gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.gen-cb{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r8);border:1px solid var(--border);cursor:pointer;font-size:12px;background:var(--surface);}
.gen-cb input{width:14px;height:14px;accent-color:var(--amber);flex-shrink:0;}
.gen-cb.on{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.07);}
body.field-mode .form-sidebar{display:none;}
body.field-mode .form-main{padding:12px;}
body.field-mode .btn{min-height:44px;}
body.field-mode input,body.field-mode select,body.field-mode textarea{font-size:16px!important;}
.rpt-bar{background:#fff;border-bottom:2px solid #E5E7EB;padding:11px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.rpt-body{max-width:860px;margin:0 auto;padding:40px 24px;}
.rpt-hdr{text-align:center;border-bottom:3px solid #1F2937;padding-bottom:24px;margin-bottom:32px;}
.rpt-hdr h1{font-size:26px;font-weight:900;color:#111;}.rpt-hdr h2{font-size:15px;font-weight:600;color:#6B7280;margin-top:4px;}
.rpt-section{margin-bottom:28px;}
.rpt-section h3{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#374151;border-bottom:2px solid #E5E7EB;padding-bottom:5px;margin-bottom:12px;}
.rpt-tbl{width:100%;border-collapse:collapse;font-size:13px;}
.rpt-tbl th{background:#F3F4F6;padding:7px 10px;text-align:right;font-weight:800;color:#6B7280;font-size:11px;}
.rpt-tbl td{padding:6px 10px;border-bottom:1px solid #F3F4F6;}
.rpt-tbl .st{background:#F9FAFB;border-top:2px solid #E5E7EB;font-weight:900;}
.rpt-sum{background:#F9FAFB;border:2px solid #1F2937;border-radius:8px;padding:18px;margin-top:10px;}
.rpt-sum-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;}
.rpt-sum-row+.rpt-sum-row{border-top:1px solid #E5E7EB;}
.rpt-p{line-height:1.9;font-size:14px;color:#374151;}
.rpt-sig{border-top:2px solid #1F2937;padding-top:24px;margin-top:32px;text-align:center;color:#6B7280;font-size:12px;}
@media print{#screenDash,#screenForm{display:none!important;}#screenReport{display:block!important;}.rpt-bar{display:none!important;}}
@media(max-width:768px){.form-sidebar{display:none;}.g2,.g3{grid-template-columns:1fr;}.span2,.span3{grid-column:span 1;}.event-grid{grid-template-columns:repeat(2,1fr);}.mode-select-grid{grid-template-columns:1fr;}.dash-stats{grid-template-columns:repeat(2,1fr);}.cases-grid{grid-template-columns:1fr;}.dash-body{padding:16px;}.dash-header{padding:20px 16px 16px;}}
</style>
</head>
<body>

<!-- MODAL -->
<div id="modalNew" class="modal-overlay">
  <div class="modal">
    <div class="modal-title">תיק חדש</div>
    <div class="modal-sub">בחר סוג שומה ותן שם לתיק</div>
    <div class="mode-select-grid">
      <div class="mode-card" id="mc_private" onclick="selMode('private')" style="--mode-c:var(--blue);--mode-bg2:rgba(59,130,246,.08)">
        <div class="mode-card-icon">🔵</div><div class="mode-card-label">שומה פרטית</div><div class="mode-card-sub">מטעם הלקוח</div>
      </div>
      <div class="mode-card" id="mc_insurance" onclick="selMode('insurance')" style="--mode-c:var(--red);--mode-bg2:rgba(239,68,68,.08)">
        <div class="mode-card-icon">🔴</div><div class="mode-card-label">שומת ביטוח</div><div class="mode-card-sub">מטעם חברת ביטוח</div>
      </div>
      <div class="mode-card" id="mc_tax" onclick="selMode('tax')" style="--mode-c:var(--green);--mode-bg2:rgba(16,185,129,.08)">
        <div class="mode-card-icon">🟢</div><div class="mode-card-label">מס רכוש</div><div class="mode-card-sub">שמאות מס רכוש</div>
      </div>
    </div>
    <div class="field"><label class="label">שם התיק *</label><input type="text" id="ncName" placeholder="שם לקוח / רחוב / מספר תיק..."></div>
    <div class="g2">
      <div class="field"><label class="label">תאריך אירוע</label><input type="date" id="ncDate"></div>
      <div class="field"><label class="label">עיר</label><input type="text" id="ncCity" placeholder="עיר הנכס..."></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:6px;">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary btn-sm" onclick="createCase()">✓ צור תיק</button>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="screenDash">
  <div class="topbar">
    <div class="topbar-logo"><span style="font-size:22px">⚖️</span><span>ירון אמיר</span><span class="badge">שמאי רכוש</span></div>
    <div style="display:flex;gap:8px;align-items:center">
      <label class="btn btn-ghost btn-sm" style="cursor:pointer">⬆ ייבא JSON<input type="file" accept=".json" style="display:none" onchange="importCase(this)"></label>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ תיק חדש</button>
    </div>
  </div>
  <div class="dash-header">
    <div class="dash-title">דשבורד תיקים</div>
    <div class="dash-sub">ניהול תיקי שמאות – נתונים שמורים מקומית במכשיר</div>
    <div class="dash-stats" id="dashStats"></div>
  </div>
  <div class="dash-body">
    <div class="dash-toolbar">
      <input class="dash-search" id="searchIn" placeholder="🔍  חיפוש לפי שם, עיר, תאריך..." oninput="renderGrid()">
      <div style="display:flex;gap:4px">
        <button class="filter-tab active" onclick="setF('all',this)">הכל</button>
        <button class="filter-tab" onclick="setF('private',this)">🔵 פרטי</button>
        <button class="filter-tab" onclick="setF('insurance',this)">🔴 ביטוח</button>
        <button class="filter-tab" onclick="setF('tax',this)">🟢 מס רכוש</button>
      </div>
    </div>
    <div class="cases-grid" id="caseGrid"></div>
  </div>
</div>

<!-- FORM -->
<div id="screenForm">
  <div class="form-topbar">
    <div class="form-topbar-left">
      <button class="btn btn-ghost btn-sm" onclick="goToDash()">← דשבורד</button>
      <div class="case-title-bar" id="fTitle"></div>
      <div class="mode-pip" id="fPip"></div>
    </div>
    <div class="form-topbar-right">
      <div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" id="pFill" style="width:0%"></div></div><span class="prog-pct" id="pPct">0%</span></div>
      <button class="btn-icon" onclick="toggleFieldMode()" title="מצב שטח">📱</button>
      <button class="btn btn-secondary btn-sm" onclick="saveCase()">💾 שמור</button>
      <button class="btn btn-primary btn-sm" onclick="genReport()">📄 דוח</button>
    </div>
  </div>
  <div class="form-layout">
    <div class="form-sidebar" id="fSidebar"></div>
    <div class="form-main" id="fMain"></div>
  </div>
</div>

<!-- REPORT -->
<div id="screenReport">
  <div class="rpt-bar">
    <div style="display:flex;gap:8px">
      <button onclick="closeRpt()" style="padding:7px 14px;font-weight:700;border-radius:8px;background:#E5E7EB;color:#374151;border:none;cursor:pointer">← עריכה</button>
      <button onclick="window.print()" style="padding:7px 14px;font-weight:700;border-radius:8px;background:#1F2937;color:#fff;border:none;cursor:pointer">🖨️ הדפסה / PDF</button>
    </div>
    <span id="rptLabel" style="font-size:12px;font-weight:700;color:#6B7280"></span>
  </div>
  <div class="rpt-body" id="rptBody"></div>
</div>
<script>
'use strict';
const ML={private:'שומה פרטית',insurance:'שומה מטעם ביטוח',tax:'מס רכוש'};
const MC={private:'var(--blue)',insurance:'var(--red)',tax:'var(--green)'};
const MB={private:'rgba(59,130,246,.18)',insurance:'rgba(239,68,68,.18)',tax:'rgba(16,185,129,.18)'};
const ET=[{id:'water',icon:'💧',label:'נזקי מים'},{id:'fire',icon:'🔥',label:'שריפה/עשן'},{id:'burglary',icon:'🚪',label:'פריצה'},{id:'electrical',icon:'⚡',label:'חשמל'},{id:'storm',icon:'🌪️',label:'סערה'},{id:'thirdparty',icon:'👷',label:"צד ג'"},{id:'other',icon:'📋',label:'אחר'}];
const ST2={water:['כשל בצנרת פנימית','כשל באיטום','חדירת מי גשם','הצפה חיצונית','אחר'],fire:['שריפה גלויה','נזקי עשן/פיח','מי כיבוי','קצר','אחר'],burglary:['פריצה','גניבה','ונדליזם','ניסיון פריצה'],electrical:['קפיצת מתח','קצר בלוח','מכשיר ספציפי','אחר'],storm:['חדירת גשם','שבר/תלישה','הצפה','אחר'],thirdparty:["פגיעה בשוגג","רשלנות",'אחר'],other:['אחר'],tax:['פגיעה ישירה','נזק הדף','נזק משני','לא ידוע']};
const PROFS=[{id:'leak',l:'מאתר נזילות'},{id:'plumber',l:'אינסטלטור'},{id:'electrician',l:'חשמלאי'},{id:'fire_inv',l:'חוקר שריפות'},{id:'contractor',l:'קבלן'},{id:'engineer',l:'מהנדס'},{id:'fire_dept',l:'כבאות'}];
const WS={'קירות/תקרה':[{id:'w_stain_wall',l:'כתמי רטיבות קיר'},{id:'w_stain_ceil',l:'כתמי תקרה'},{id:'w_capillary',l:'עליות קפילריות'},{id:'w_plaster_swell',l:'התנפחות טיח'},{id:'w_plaster_fall',l:'התפרקות טיח'},{id:'w_paint_peel',l:'קילופי צבע'},{id:'w_false_ceil',l:'תקרה משנית'}],'ריצוף':[{id:'w_parquet',l:'התנפחות פרקט'},{id:'w_water_up',l:'עליות מים'},{id:'w_grout',l:'תפרחת'},{id:'w_subfloor',l:'תשתית רטובה'}],'חד"ר רטובים':[{id:'w_ceramic_sep',l:'הפרדת קרמיקה'},{id:'w_seal',l:'בעיות איטום'}],'מטבח':[{id:'w_kit_back',l:'גב מטבח'},{id:'w_kit_base',l:'צוקל'}],'חשמל':[{id:'w_elec_panel',l:'לוח חשמל'},{id:'w_elec_sys',l:'מערכת'}],'עובש':[{id:'w_mold',l:'סימני עובש'},{id:'w_smell',l:'ריח טחב'}]};
const FS={'שריפה':[{id:'f_soot',l:'פיח'},{id:'f_smoke',l:'עשן'},{id:'f_direct',l:'פגיעה ישירה'},{id:'f_water_ext',l:'מי כיבוי'},{id:'f_melt',l:'התכה'},{id:'f_elec',l:'נזק חשמל'},{id:'f_false_ceil',l:'תקרה משנית'}]};
const BS={'פריצה':[{id:'b_frame',l:'נזק משקוף'},{id:'b_door',l:'שבר דלת'},{id:'b_window',l:'שבר חלון'},{id:'b_lock',l:'עקירת נעילה'},{id:'b_vandal',l:'ונדליזם'},{id:'b_alarm',l:'מערכת אזעקה'}]};
const TS={'מס רכוש':[{id:'t_direct',l:'פגיעה ישירה'},{id:'t_envelope',l:'מעטפת'},{id:'t_shock',l:'נזקי הדף'},{id:'t_shrapnel',l:'רסיסים'},{id:'t_secondary',l:'נזק משני'}]};
const ROOMS_R=[{id:'living',l:'סלון',sqm:25,rep:0},{id:'kitchen',l:'מטבח',sqm:12,rep:0},{id:'bedroom',l:'חדר שינה',sqm:14,rep:3},{id:'kids',l:'חדר ילדים',sqm:12,rep:2},{id:'bath',l:'חדר רחצה',sqm:6,rep:0},{id:'toilet',l:'שירותים',sqm:3,rep:0},{id:'hall',l:'מסדרון',sqm:8,rep:0},{id:'balcony',l:'מרפסת',sqm:10,rep:0},{id:'storage',l:'מחסן',sqm:6,rep:0},{id:'ceil',l:'תקרה כללי',sqm:0,rep:0},{id:'other_r',l:'אחר',sqm:0,rep:0}];
const ROOMS_B=[{id:'sales',l:'חלל מכירה',sqm:60,rep:0},{id:'office',l:'משרד',sqm:20,rep:2},{id:'warehouse',l:'מחסן',sqm:30,rep:0},{id:'lobby',l:'לובי',sqm:15,rep:0},{id:'bath_biz',l:'שירותים',sqm:5,rep:0},{id:'other_b',l:'אחר',sqm:0,rep:0}];
const CARDS=[{n:1,icon:'👤',t:'נתוני בסיס',s:'פרטי מזמין, כתובת, תאריכים'},{n:2,icon:'🏠',t:'מאפייני נכס',s:'סוג, שימוש, שטח'},{n:3,icon:'📋',t:'ביטוח וכיסויים',s:'פוליסה וסכומים',ins:true},{n:4,icon:'⚡',t:'פרטי האירוע',s:'סוג, מקור, גורמים'},{n:5,icon:'💬',t:'נסיבות המקרה',s:'גרסה ושאלות'},{n:6,icon:'🔍',t:'ממצאי שמאי',s:'אזורים וסימני פגיעה'},{n:7,icon:'📊',t:'כתב כמויות',s:'BOQ ותמחור'},{n:8,icon:'✅',t:'סיכום',s:'הערכה סופית'},{n:9,icon:'📷',t:'תמונות',s:'תיעוד ביקור'}];

let caseId=null,mode=null,card=1,flt='all';
let S={};

function blank(m){return{mode:m,base:{fullName:'',idNum:'',phone:'',email:'',eventDate:'',visitDate:'',city:'',street:'',streetNum:'',apartment:''},property:{type:'apartment',usage:'residential',sqm:'',floor:'',yearBuilt:'',material:'',preCondition:''},insurance:{company:'',policyNum:'',claimNum:'',structureSum:'',contentsSum:'',structureActual:'',contentsActual:'',deductStruct:'',deductContents:'',thirdParty:false,lossOfProfits:false,vatBiz:false,arrangementPlumber:false},event:{eventType:'',eventSubType:'',plumberType:'',requestedBy:'',requesterName:'',visitPurpose:[],policeReport:'',policeNum:'',professionals:[],profDetails:{},declaration:''},circ:{infoSource:'',infoName:'',discDate:'',discTime:'',wasOccupied:'',immediateAction:'',ongoingDmg:'',pastEvent:'',waterOrigin:'',waterDuration:'',wallOpened:'',prevRepair:'',prevRepairDate:'',prevRepairBy:'',prevRepairReason:'',recentPlumber:'',recentPlumberDate:'',recentPlumberReason:'',fireLocation:'',fireDept:'',fireType:'',burglaryMethod:'',stolenItems:'',alarmExists:'',extraNotes:'',override:''},findings:{areas:[],labTest:false,matchesStory:'',generalNotes:'',override:'',freeAreaName:''},boq:{structItems:[],contentsItems:[],serviceItems:[],vat:false,hasClaim:false,claimAmount:'',restoredState:'',genItems:{cleaning:true,waste:false,container:false,moveContents:false,drying:false,supervision:false},genNote:''},summary:{openingOverride:'',appraisalNotes:'',recommendations:'',signature:'',claimNote:''},photos:{main:null,mainCaption:'',items:[]}};}

function getAll(){try{return JSON.parse(localStorage.getItem('ya2')||'[]');}catch(e){return[];}}
function setAll(a){try{localStorage.setItem('ya2',JSON.stringify(a));}catch(e){}}
function getById(id){return getAll().find(c=>c.id===id)||null;}
function prog(st){const checks=[st.base.fullName,st.base.eventDate,st.base.visitDate,st.base.city,st.property.sqm,st.event.eventType,st.circ.infoSource||st.circ.discDate,(st.findings.areas||[]).length>0,(st.boq.structItems||[]).length>0||(st.boq.contentsItems||[]).length>0];return Math.round(checks.filter(Boolean).length/checks.length*100);}
function grand(st){return sec(st.boq?.structItems)+sec(st.boq?.contentsItems)+sec(st.boq?.serviceItems);}

function renderDash(){
  const all=getAll();
  const byT={private:0,insurance:0,tax:0};let ap=0;
  all.forEach(c=>{byT[c.mode]=(byT[c.mode]||0)+1;ap+=prog(c.state||blank(c.mode));});
  if(all.length)ap=Math.round(ap/all.length);
  document.getElementById('dashStats').innerHTML=`
    <div class="stat-card"><div class="stat-num">${all.length}</div><div class="stat-label">סה"כ תיקים</div></div>
    <div class="stat-card stat-blue"><div class="stat-num">${byT.private}</div><div class="stat-label">פרטי</div></div>
    <div class="stat-card stat-red"><div class="stat-num">${byT.insurance}</div><div class="stat-label">ביטוח</div></div>
    <div class="stat-card stat-green"><div class="stat-num">${byT.tax}</div><div class="stat-label">מס רכוש</div></div>
    <div class="stat-card stat-amber"><div class="stat-num">${ap}%</div><div class="stat-label">ממוצע השלמה</div></div>`;
  renderGrid();
}
function setF(f,btn){flt=f;document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderGrid();}
function renderGrid(){
  const all=getAll();const q=(document.getElementById('searchIn').value||'').toLowerCase();
  const fil=all.filter(c=>{if(flt!=='all'&&c.mode!==flt)return false;if(q){const h=(c.name+' '+(c.state?.base?.city||'')+' '+(c.state?.base?.eventDate||'')).toLowerCase();if(!h.includes(q))return false;}return true;});
  if(!fil.length){document.getElementById('caseGrid').innerHTML=`<div class="case-empty"><div class="case-empty-icon">${all.length?'🔍':'📂'}</div><div class="case-empty-title">${all.length?'אין תוצאות':'אין תיקים עדיין'}</div><div style="font-size:13px">${all.length?'נסה חיפוש אחר':'לחץ "+ תיק חדש" להתחלה'}</div></div>`;return;}
  const clr={private:'var(--blue)',insurance:'var(--red)',tax:'var(--green)'};
  const bg={private:'rgba(59,130,246,.15)',insurance:'rgba(239,68,68,.15)',tax:'rgba(16,185,129,.15)'};
  document.getElementById('caseGrid').innerHTML=fil.map(c=>{
    const st=c.state||blank(c.mode);const p=prog(st);
    const ev=(ET.find(e=>e.id===st.event.eventType)||{}).label||'—';
    const addr=[st.base.city,st.base.street,st.base.streetNum].filter(Boolean).join(' ');
    const g=grand(st);
    return `<div class="case-card" style="--mode-color:${clr[c.mode]}" onclick="openCase('${c.id}')">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div class="case-name">${esc(c.name||'ללא שם')}</div>
        <div class="case-mode-badge" style="--mode-color:${clr[c.mode]};--mode-bg:${bg[c.mode]}">${ML[c.mode]}</div>
      </div>
      <div class="case-meta">
        <div class="case-meta-item"><strong>${esc(addr||'—')}</strong>כתובת</div>
        <div class="case-meta-item"><strong>${esc(ev)}</strong>סוג אירוע</div>
        <div class="case-meta-item"><strong>${esc(st.base.eventDate||'—')}</strong>תאריך</div>
        <div class="case-meta-item"><strong>${g>0?'₪'+fmt(g):'—'}</strong>הערכה</div>
      </div>
      <div class="cpb-label"><span>השלמה</span><span>${p}%</span></div>
      <div class="cpb"><div class="cpb-fill" style="width:${p}%"></div></div>
      <div class="case-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-xs" onclick="exportC('${c.id}')">⬇ ייצא</button>
        <button class="btn btn-ghost btn-xs" onclick="openCase('${c.id}')">✏️ ערוך</button>
        <button class="btn btn-danger btn-xs" onclick="delC('${c.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}
function delC(id){if(!confirm('למחוק?'))return;setAll(getAll().filter(c=>c.id!==id));renderDash();}
function exportC(id){const c=getById(id);if(!c)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(c,null,2)],{type:'application/json'}));a.download=`appraisal_${(c.name||'case').replace(/\s/g,'_')}.json`;a.click();}
function importCase(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);const all=getAll();all.unshift({id:'c'+Date.now(),name:d.name||'מיובא',mode:d.mode||d.state?.mode||'insurance',state:d.state||d});setAll(all);alert('✓ יובא!');renderDash();}catch(ex){alert('שגיאה בקובץ');}};r.readAsText(f);inp.value='';}

let _nm='insurance';
function openModal(){_nm='insurance';document.querySelectorAll('.mode-card').forEach(m=>m.classList.remove('selected'));document.getElementById('mc_insurance').classList.add('selected');document.getElementById('ncName').value='';document.getElementById('ncDate').value='';document.getElementById('ncCity').value='';document.getElementById('modalNew').classList.add('open');setTimeout(()=>document.getElementById('ncName').focus(),80);}
function closeModal(){document.getElementById('modalNew').classList.remove('open');}
function selMode(m){_nm=m;document.querySelectorAll('.mode-card').forEach(c=>c.classList.remove('selected'));document.getElementById('mc_'+m).classList.add('selected');}
function createCase(){const name=document.getElementById('ncName').value.trim()||'תיק חדש';const id='c'+Date.now();const st=blank(_nm);st.base.eventDate=document.getElementById('ncDate').value;st.base.city=document.getElementById('ncCity').value.trim();const all=getAll();all.unshift({id,name,mode:_nm,state:st});setAll(all);closeModal();openCase(id);}

function openCase(id){
  const c=getById(id);if(!c)return;
  caseId=id;mode=c.mode;S=c.state||blank(c.mode);card=1;
  document.getElementById('screenDash').style.display='none';
  const sf=document.getElementById('screenForm');sf.style.display='flex';sf.style.flexDirection='column';
  document.getElementById('fTitle').textContent=c.name||'תיק';
  const pip=document.getElementById('fPip');
  pip.textContent={private:'🔵',insurance:'🔴',tax:'🟢'}[mode]+' '+ML[mode];
  pip.style.cssText=`padding:3px 10px;border-radius:20px;font-size:10px;font-weight:900;background:${MB[mode]};color:${MC[mode]}`;
  buildSidebar();goCard(1);
}
function goToDash(){saveCase();document.getElementById('screenForm').style.display='none';document.getElementById('screenDash').style.display='flex';renderDash();}
function saveCase(){if(!caseId)return;const all=getAll();const i=all.findIndex(c=>c.id===caseId);if(i>=0){all[i].state=JSON.parse(JSON.stringify(S));setAll(all);}updateProg();}
function getCards(){return mode==='tax'?[1,2,4,5,6,7,8,9]:[1,2,3,4,5,6,7,8,9];}
function goCard(n){card=n;document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',+el.dataset.card===n));renderCard(n);updateProg();const all=getAll();const i=all.findIndex(c=>c.id===caseId);if(i>=0){all[i].state=JSON.parse(JSON.stringify(S));setAll(all);}}
function nextCard(){const cards=getCards();const i=cards.indexOf(card);if(i<cards.length-1)goCard(cards[i+1]);else genReport();}
function prevCard(){const cards=getCards();const i=cards.indexOf(card);if(i>0)goCard(cards[i-1]);}
function updateProg(){const p=prog(S);const f=document.getElementById('pFill');const t=document.getElementById('pPct');if(f)f.style.width=p+'%';if(t)t.textContent=p+'%';}
function buildSidebar(){const v=CARDS.filter(c=>!(c.ins&&mode==='tax'));document.getElementById('fSidebar').innerHTML=v.map(c=>`<div class="nav-item" data-card="${c.n}" onclick="goCard(${c.n})"><span class="ni">${c.icon}</span><div><div class="nt">${c.t}</div><div class="ns">${c.s}</div></div></div>`).join('');}
function renderCard(n){const def=CARDS.find(c=>c.n===n)||CARDS[0];const cards=getCards();const idx=cards.indexOf(n);const last=idx===cards.length-1;const fns=[null,rC1,rC2,rC3,rC4,rC5,rC6,rC7,rC8,rC9];let h=`<div class="card-header"><h2>${def.icon} ${def.t}</h2><p>${def.s}</p></div><div class="card-body">${fns[n]?fns[n]():''}</div><div class="card-nav"><button class="btn btn-secondary" onclick="prevCard()" ${idx===0?'disabled':''}>← הקודם</button><button class="btn btn-primary" onclick="nextCard()">${last?'📄 צור דוח':'הבא →'}</button></div>`;document.getElementById('fMain').innerHTML=h;document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',+el.dataset.card===n));}

function rC1(){const b=S.base;return `<div class="g2"><div class="field span2"><label class="label">שם מלא *</label><input value="${esc(b.fullName)}" oninput="S.base.fullName=this.value" placeholder="שם פרטי ומשפחה"></div><div class="field"><label class="label">ת.ז / ח.פ</label><input value="${esc(b.idNum)}" oninput="S.base.idNum=this.value"></div><div class="field"><label class="label">טלפון</label><input type="tel" value="${esc(b.phone)}" oninput="S.base.phone=this.value"></div><div class="field span2"><label class="label">דואל</label><input type="email" value="${esc(b.email)}" oninput="S.base.email=this.value"></div><div class="divider"></div><div class="field"><label class="label">תאריך אירוע *</label><input type="date" value="${esc(b.eventDate)}" oninput="S.base.eventDate=this.value"></div><div class="field"><label class="label">תאריך ביקור *</label><input type="date" value="${esc(b.visitDate)}" oninput="S.base.visitDate=this.value"></div><div class="divider"></div><div class="field"><label class="label">עיר *</label><input value="${esc(b.city)}" oninput="S.base.city=this.value"></div><div class="field"><label class="label">רחוב *</label><input value="${esc(b.street)}" oninput="S.base.street=this.value"></div><div class="field"><label class="label">מספר</label><input value="${esc(b.streetNum)}" oninput="S.base.streetNum=this.value"></div><div class="field"><label class="label">דירה</label><input value="${esc(b.apartment)}" oninput="S.base.apartment=this.value"></div></div>`;}

function rC2(){const p=S.property;return `<div class="g2"><div class="field"><label class="label">סוג נכס</label><select onchange="S.property.type=this.value">${[['apartment','דירה'],['house','בית'],['shop','חנות'],['office','משרד'],['warehouse','מחסן'],['other','אחר']].map(([v,l])=>`<option value="${v}" ${p.type===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="field"><label class="label">שימוש</label><select onchange="S.property.usage=this.value">${[['residential','מגורים'],['business','עסקי'],['mixed','מעורב']].map(([v,l])=>`<option value="${v}" ${p.usage===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="field"><label class="label">שטח מ"ר *</label><input type="number" value="${esc(p.sqm)}" oninput="S.property.sqm=this.value" min="0"></div><div class="field"><label class="label">קומה</label><input value="${esc(p.floor)}" oninput="S.property.floor=this.value"></div><div class="field"><label class="label">שנת בנייה</label><input type="number" value="${esc(p.yearBuilt)}" oninput="S.property.yearBuilt=this.value"></div><div class="field"><label class="label">חומר בנייה</label><select onchange="S.property.material=this.value">${[['','—'],['concrete','בטון'],['blocks','בלוקים'],['prefab','פל-קל'],['wood','עץ'],['steel','פלדה'],['other','אחר']].map(([v,l])=>`<option value="${v}" ${p.material===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="field span2"><label class="label">מצב הנכס לפני האירוע</label><select onchange="S.property.preCondition=this.value">${[['','—'],['good','תקין'],['fair','בלאי סביר'],['poor','ליקויים משמעותיים'],['unknown','לא ידוע']].map(([v,l])=>`<option value="${v}" ${p.preCondition===v?'selected':''}>${l}</option>`).join('')}</select></div></div>`;}

function rC3(){if(mode==='tax')return'<div class="note note-green">מסלול מס רכוש – אין פרטי ביטוח.</div>';const ins=S.insurance;const sS=parseFloat(ins.structureSum)||0,sA=parseFloat(ins.structureActual)||0,cS=parseFloat(ins.contentsSum)||0,cA=parseFloat(ins.contentsActual)||0,sqm=parseFloat(S.property.sqm)||0;const su=sS>0&&sA>0&&sA>sS*1.1,cu=cS>0&&cA>0&&cA>cS*1.1,est=sqm*8500,sqw=sqm>0&&sS>0&&est>sS*1.15&&!sA;const isI=mode==='insurance';return`<div class="g2"><div class="field ${isI?'span2':''}"><label class="label">חברת ביטוח</label><input value="${esc(ins.company)}" oninput="S.insurance.company=this.value"></div>${isI?`<div class="field"><label class="label">מספר פוליסה</label><input value="${esc(ins.policyNum)}" oninput="S.insurance.policyNum=this.value"></div><div class="field"><label class="label">מספר תביעה</label><input value="${esc(ins.claimNum)}" oninput="S.insurance.claimNum=this.value"></div>`:''}<div class="divider"></div><span class="section-label span2">📐 מבנה</span><div class="field"><label class="label">סכום ביטוח מבנה ₪</label><input type="number" value="${esc(ins.structureSum)}" oninput="S.insurance.structureSum=this.value;renderCard(3)" min="0"></div><div class="field"><label class="label">שווי בפועל מבנה ₪</label><input type="number" value="${esc(ins.structureActual)}" oninput="S.insurance.structureActual=this.value;renderCard(3)" min="0"></div>${su?`<div class="span2"><span class="under-badge under-warn">⚠️ תת-ביטוח מבנה: ${Math.round((1-sS/sA)*100)}% מתחת לשווי</span></div>`:''} ${sqw?`<div class="span2"><span class="under-badge under-warn">⚠️ לפי ${sqm}מ"ר × ₪8,500 = ₪${fmt(est)} – בדוק תת-ביטוח</span></div>`:''} ${sS>0&&sA>0&&!su?`<div class="span2"><span class="under-badge under-ok">✓ אין תת-ביטוח מבנה</span></div>`:''}<div class="field"><label class="label">השתתפות עצמית מבנה ₪</label><input type="number" value="${esc(ins.deductStruct)}" oninput="S.insurance.deductStruct=this.value" min="0"></div><div class="divider"></div><span class="section-label span2">🛋️ תכולה</span><div class="field"><label class="label">סכום ביטוח תכולה ₪</label><input type="number" value="${esc(ins.contentsSum)}" oninput="S.insurance.contentsSum=this.value;renderCard(3)" min="0"></div><div class="field"><label class="label">שווי בפועל תכולה ₪</label><input type="number" value="${esc(ins.contentsActual)}" oninput="S.insurance.contentsActual=this.value;renderCard(3)" min="0"></div>${cu?`<div class="span2"><span class="under-badge under-warn">⚠️ תת-ביטוח תכולה: ${Math.round((1-cS/cA)*100)}%</span></div>`:''} ${cS>0&&cA>0&&!cu?`<div class="span2"><span class="under-badge under-ok">✓ אין תת-ביטוח תכולה</span></div>`:''}<div class="field"><label class="label">השתתפות עצמית תכולה ₪</label><input type="number" value="${esc(ins.deductContents)}" oninput="S.insurance.deductContents=this.value" min="0"></div><div class="divider"></div><div class="span2" style="display:flex;flex-wrap:wrap;gap:8px">${[['thirdParty',"הרחבת צד ג'"],['lossOfProfits','אובדן רווחים'],['vatBiz','עסק מקזז מע"מ']].map(([k,l])=>`<button class="chip ${ins[k]?'on':''}" onclick="S.insurance['${k}']=!S.insurance['${k}'];this.classList.toggle('on')">${l}</button>`).join('')}${isI?`<button class="chip ${ins.arrangementPlumber?'on':''}" onclick="S.insurance.arrangementPlumber=!S.insurance.arrangementPlumber;renderCard(3)">שרברב הסדר</button>`:''}</div>${ins.arrangementPlumber&&isI?`<div class="note span2">שרברב הסדר – סעיף התיקון ב-BOQ ללא תמחור</div>`:''}</div>`;}

function rC4(){const ev=S.event,isTax=mode==='tax';let h='';if(isTax){h+=`<div class="note note-green mb8">מסלול מס רכוש</div><div class="field mb12"><label class="label">סיווג פגיעה</label><div class="pill-group">${ST2.tax.map(s=>`<button class="pill ${ev.eventSubType===s?'on-green':''}" onclick="S.event.eventSubType='${s}';renderCard(4)">${s}</button>`).join('')}</div></div>`;}else{h+=`<label class="label">סוג האירוע *</label><div class="event-grid" style="margin-bottom:16px">${ET.map(et=>`<div class="event-card ${ev.eventType===et.id?'selected':''}" onclick="S.event.eventType='${et.id}';S.event.eventSubType='';renderCard(4)"><div class="ei">${et.icon}</div><div class="el">${et.label}</div></div>`).join('')}</div>`;if(ev.eventType){const subs=ST2[ev.eventType]||[];if(subs.length)h+=`<div class="field mb12"><label class="label">תת-סיווג</label><div class="pill-group">${subs.map(s=>`<button class="pill ${ev.eventSubType===s?'on':''}" onclick="S.event.eventSubType='${s}';renderCard(4)">${s}</button>`).join('')}</div></div>`;if(ev.eventType==='water')h+=`<div class="field mb12"><label class="label">שרברב טיפול</label><div class="pill-group">${[['arrangement','הסדר'],['private','פרטי'],['unknown','לא ידוע']].map(([v,l])=>`<button class="pill ${ev.plumberType===v?'on':''}" onclick="S.event.plumberType='${v}';renderCard(4)">${l}</button>`).join('')}</div></div>`;}}h+=`<div class="g2" style="margin-top:12px"><div class="field"><label class="label">מקור הפנייה</label><select onchange="S.event.requestedBy=this.value">${[['','בחר...'],['insured','המבוטח'],['owner','בעל הנכס'],['lawyer',"עו\"ד"],['agent','סוכן ביטוח'],['other','אחר']].map(([v,l])=>`<option value="${v}" ${ev.requestedBy===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="field"><label class="label">שם הפונה</label><input value="${esc(ev.requesterName)}" oninput="S.event.requesterName=this.value"></div></div>`;if(!isTax)h+=`<div class="g2"><div class="field"><label class="label">תלונה/אסמכתא</label><div class="pill-group">${[['yes','כן'],['no','לא']].map(([v,l])=>`<button class="pill ${ev.policeReport===v?'on':''}" onclick="S.event.policeReport='${v}';renderCard(4)">${l}</button>`).join('')}</div></div>${ev.policeReport==='yes'?`<div class="field"><label class="label">מספר אסמכתא</label><input value="${esc(ev.policeNum)}" oninput="S.event.policeNum=this.value"></div>`:'<div></div>'}</div>`;h+=`<div class="field" style="margin-top:10px"><label class="label">גורמים מקצועיים</label><div style="display:flex;flex-direction:column;gap:8px">${PROFS.map(pr=>{const chk=(ev.professionals||[]).includes(pr.id);const det=ev.profDetails[pr.id]||{};return`<div><button class="chip ${chk?'on':''}" onclick="togProf('${pr.id}',this)">${pr.l}</button>${chk?`<div class="g2" style="margin-top:6px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r8)"><div class="field"><label class="label">שם</label><input value="${esc(det.name||'')}" oninput="setP('${pr.id}','name',this.value)"></div><div class="field"><label class="label">נמסר דוח</label><div class="pill-group">${[['yes','כן'],['no','לא']].map(([v,l])=>`<button class="pill ${det.report===v?'on':''}" onclick="setP('${pr.id}','report','${v}');renderCard(4)">${l}</button>`).join('')}</div></div></div>`:''}</div>`;}).join('')}</div></div>`;h+=`<div class="field" style="margin-top:12px"><label class="label">הצהרת שמאי</label><textarea oninput="S.event.declaration=this.value" placeholder="הח&quot;מ ביצע בדיקה עצמאית...">${esc(ev.declaration)}</textarea></div>`;return h;}

function rC5(){const c=S.circ,et=S.event.eventType;let h=`<div class="g2"><div class="field"><label class="label">מי מסר מידע</label><select onchange="S.circ.infoSource=this.value">${[['','בחר...'],['insured','המבוטח'],['tenant','הדייר'],['employee','עובד'],['manager','מנהל'],['other','אחר']].map(([v,l])=>`<option value="${v}" ${c.infoSource===v?'selected':''}>${l}</option>`).join('')}</select></div><div class="field"><label class="label">שם מוסר המידע</label><input value="${esc(c.infoName)}" oninput="S.circ.infoName=this.value"></div><div class="field"><label class="label">תאריך גילוי</label><input type="date" value="${esc(c.discDate)}" oninput="S.circ.discDate=this.value"></div><div class="field"><label class="label">שעת גילוי</label><input type="time" value="${esc(c.discTime)}" oninput="S.circ.discTime=this.value"></div><div class="field"><label class="label">הנכס היה מאוכלס?</label><div class="pill-group">${p3([['yes','כן'],['no','לא']],c.wasOccupied,"S.circ.wasOccupied=v;renderCard(5)")}</div></div><div class="field"><label class="label">הנזק המשיך?</label><div class="pill-group">${p3([['yes','כן'],['no','לא']],c.ongoingDmg,"S.circ.ongoingDmg=v;renderCard(5)")}</div></div><div class="field span2"><label class="label">פעולה מיידית</label><input value="${esc(c.immediateAction)}" oninput="S.circ.immediateAction=this.value" placeholder="ניתוק מים/חשמל..."></div><div class="field"><label class="label">אירוע דומה בעבר?</label><div class="pill-group">${p3([['yes','כן'],['no','לא']],c.pastEvent,"S.circ.pastEvent=v;renderCard(5)")}</div></div></div>`;
if(et==='water'){h+=`<div style="background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:var(--r12);padding:14px;margin:12px 0"><span class="section-label" style="color:var(--blue)">💧 שאלות מים</span><div class="g2"><div class="field"><label class="label">מקור המים</label><input value="${esc(c.waterOrigin)}" oninput="S.circ.waterOrigin=this.value"></div><div class="field"><label class="label">משך זרימה</label><input value="${esc(c.waterDuration)}" oninput="S.circ.waterDuration=this.value" placeholder="שעות/ימים"></div><div class="field"><label class="label">בוצעה פתיחה?</label><div class="pill-group">${p3([['yes','כן'],['no','לא'],['partial','חלקית']],c.wallOpened,"S.circ.wallOpened=v;renderCard(5)")}</div></div></div><div class="field"><label class="label">תיקון קודם?</label><div class="pill-group">${p3([['yes','כן'],['no','לא']],c.prevRepair,"S.circ.prevRepair=v;renderCard(5)")}</div></div>${c.prevRepair==='yes'?`<div class="g2" style="margin-top:8px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r8)"><div class="field"><label class="label">תאריך</label><input type="date" value="${esc(c.prevRepairDate)}" oninput="S.circ.prevRepairDate=this.value"></div><div class="field"><label class="label">סיבה</label><input value="${esc(c.prevRepairReason)}" oninput="S.circ.prevRepairReason=this.value"></div></div>`:''}<div class="field" style="margin-top:8px"><label class="label">שרברב בחודשים אחרונים?</label><div class="pill-group">${p3([['yes','כן'],['no','לא']],c.recentPlumber,"S.circ.recentPlumber=v;renderCard(5)")}</div></div>${c.recentPlumber==='yes'?`<div class="g2" style="margin-top:8px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r8)"><div class="field"><label class="label">תאריך</label><input type="date" value="${esc(c.recentPlumberDate)}" oninput="S.circ.recentPlumberDate=this.value"></div><div class="field"><label class="label">מהות</label><input value="${esc(c.recentPlumberReason)}" oninput="S.circ.recentPlumberReason=this.value"></div></div>`:''}</div>`;}
if(et==='fire'){h+=`<div style="background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--r12);padding:14px;margin:12px 0"><span class="section-label" style="color:var(--red)">🔥 שאלות שריפה</span><div class="g2"><div class="field"><label class="label">היכן פרצה</label><input value="${esc(c.fireLocation)}" oninput="S.circ.fireLocation=this.value"></div><div class="field"><label class="label">כוחות כיבוי?</label><div class="pill-group">${p3([['yes','כן'],['no','לא']],c.fireDept,"S.circ.fireDept=v;renderCard(5)")}</div></div></div></div>`;}
if(et==='burglary'){h+=`<div style="background:rgba(139,92,246,.06);border:1px solid rgba(139,92,246,.2);border-radius:var(--r12);padding:14px;margin:12px 0"><span class="section-label" style="color:#A78BFA">🚪 שאלות פריצה</span><div class="g2"><div class="field"><label class="label">כיצד בוצעה</label><input value="${esc(c.burglaryMethod)}" oninput="S.circ.burglaryMethod=this.value"></div><div class="field"><label class="label">פריטים שנגנבו</label><input value="${esc(c.stolenItems)}" oninput="S.circ.stolenItems=this.value"></div><div class="field"><label class="label">אזעקה?</label><div class="pill-group">${p3([['yes','כן'],['no','לא']],c.alarmExists,"S.circ.alarmExists=v;renderCard(5)")}</div></div></div></div>`;}
const ct=gCirc();h+=`<div class="field"><label class="label">הערות שמאי</label><textarea oninput="S.circ.extraNotes=this.value">${esc(c.extraNotes)}</textarea></div>`;if(ct)h+=`<div class="preview-box" style="margin-top:8px"><div class="pb-label">טקסט אוטומטי</div><div class="pb-text">${esc(ct)}</div></div>`;h+=`<div class="field" style="margin-top:8px"><label class="label" style="color:var(--amber)">Override (ריק = אוטומטי)</label><textarea oninput="S.circ.override=this.value" placeholder="...">${esc(c.override||'')}</textarea></div>`;return h;}

function gExpl(){const pts=[],ins=S.insurance,boq=S.boq,g=sec(boq.structItems)+sec(boq.contentsItems)+sec(boq.serviceItems);const L=['א','ב','ג','ד','ה','ו','ז','ח','ט','י'];let i=0;const add=t=>pts.push(`${L[i++]}. ${t}`);add('הערכת הנזק בוצעה על-פי ממצאי הביקור, מסמכים שנמסרו לשמאי ועקרונות שמאות מקובלים.');if(mode==='insurance'){const sS=parseFloat(ins.structureSum)||0,sA=parseFloat(ins.structureActual)||0,su=sS>0&&sA>0&&sA>sS*1.1;if(su)add(`נמצא תת-ביטוח מבנה (יחס ${Math.round(sS/sA*100)}%). השיפוי יחושב בהתאם לסעיף תת-ביטוח.`);else add('לא נמצא תת-ביטוח. הפיצוי חושב לפי ערך שיפוי מלא.');add('הנזקים הוערכו לפי ערך כינון. ערך השיפוי הופחת בשליש.');if(parseFloat(ins.deductStruct)>0)add(`הופחתה השתתפות עצמית ₪${fmt(parseFloat(ins.deductStruct))}.`);if(ins.lossOfProfits)add("הפוליסה כוללת אובדן רווחים – לבדיקה נפרדת.");if(ins.thirdParty)add("הפוליסה כוללת צד ג' – לבדיקת חשיפה.");}else if(mode==='private'){add('הערכה מבוססת על עלויות שיקום מלא לרמה הקיימת ערב האירוע.');if(boq.vat)add('הסכומים כוללים מע"מ 18%.');}else{add('הנזקים הוערכו לפי קריטריונים של מס רכוש.');}if(S.findings.labTest)add('בוצעה/תבוצע בדיקת מעבדה לאישור ממצאי לחות.');if(g>0)add(`סכום הנזק מוערך ב-₪${fmt(Math.round(g))} לפני מע"מ.`);add('חוות דעת זו הוכנה ע"י השמאי הח"מ בהתבסס על ממצאיו בלבד.');return pts.join('\n');}

function addBOQ(k){const items=S.boq[k];const p=k==='structItems'?'':k==='contentsItems'?'C':'S';items.push({id:p+(items.length+1),desc:'',unit:"קומפ'",qty:'1',price:'',zeroPrice:false});renderCard(7);}
function updB(k,id,field,val){const it=(S.boq[k]||[]).find(i=>String(i.id)===String(id));if(it)it[field]=val;}
function delB(k,id){S.boq[k]=(S.boq[k]||[]).filter(i=>String(i.id)!==String(id));renderCard(7);}
function loadMain(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{S.photos.main=e.target.result;renderCard(9);};r.readAsDataURL(f);}
function loadPhotos(inp){const files=Array.from(inp.files);const rem=8-(S.photos.items||[]).length;let done=0;files.slice(0,rem).forEach(f=>{const r=new FileReader();r.onload=e=>{S.photos.items.push({src:e.target.result,caption:''});done++;if(done>=Math.min(files.length,rem))renderCard(9);};r.readAsDataURL(f);});}
function rmPhoto(i){S.photos.items.splice(i,1);renderCard(9);}
window.addEventListener('load',()=>{renderDash();document.getElementById('modalNew').addEventListener('click',e=>{if(e.target===document.getElementById('modalNew'))closeModal();});});
</script>
