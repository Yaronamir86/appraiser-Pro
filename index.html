<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ירון אמיר | שמאי רכוש — דשבורד</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Frank+Ruhl+Libre:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #030712;
  --surface: #0d1117;
  --surface2: #111827;
  --surface3: #1a2332;
  --border: #1f2937;
  --border2: #374151;
  --text: #f9fafb;
  --muted: #9ca3af;
  --subtle: #6b7280;
  --accent: #f59e0b;
  --accent2: #fde68a;
  --accent3: #d97706;
  --blue: #3b82f6;
  --red: #ef4444;
  --green: #10b981;
  --purple: #8b5cf6;
  --pink: #ec4899;
  --r: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUND TEXTURE ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(245,158,11,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(59,130,246,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(3,7,18,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 32px;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 38px;
  height: 38px;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 3px 12px rgba(245,158,11,0.3);
}
.logo-text {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
}
.logo-sub {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  display: block;
  margin-top: -2px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 9px 20px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  transition: all 0.18s;
  text-decoration: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  color: #111;
  box-shadow: 0 3px 12px rgba(245,158,11,0.3);
}
.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 5px 20px rgba(245,158,11,0.45);
}
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
}
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-sm { padding: 6px 14px; font-size: 12px; border-radius: 8px; }

/* ── MAIN LAYOUT ── */
main {
  position: relative;
  z-index: 1;
  max-width: 1300px;
  margin: 0 auto;
  padding: 40px 32px 80px;
}

/* ── PAGE TITLE ── */
.page-title-wrap {
  margin-bottom: 40px;
}
.page-title {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.2;
}
.page-title span {
  color: var(--accent);
}
.page-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-top: 8px;
  font-weight: 400;
}

/* ── STATS GRID ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 40px;
}
@media (max-width: 900px) {
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
.stat-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 22px;
  position: relative;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.stat-card:hover {
  transform: translateY(-2px);
  border-color: var(--border2);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 60px;
  height: 60px;
  border-radius: 0 0 0 60px;
  opacity: 0.15;
}
.stat-card.gold::before { background: var(--accent); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.red::before { background: var(--red); }
.stat-card.green::before { background: var(--green); }
.stat-icon {
  font-size: 22px;
  margin-bottom: 14px;
  display: block;
}
.stat-value {
  font-family: 'Frank Ruhl Libre', serif;
  font-size: 38px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}
.stat-card.gold .stat-value { color: var(--accent); }
.stat-card.blue .stat-value { color: var(--blue); }
.stat-card.red .stat-value { color: var(--red); }
.stat-card.green .stat-value { color: var(--green); }
.stat-label {
  font-size: 12px;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.stat-trend {
  font-size: 11px;
  color: var(--subtle);
  margin-top: 8px;
}

/* ── SECTION HEADER ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}
.section-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  display: inline-block;
}

/* ── CASE GRID ── */
.case-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
}

/* ── CASE CARD ── */
.case-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-decoration: none;
  display: block;
}
.case-card:hover {
  border-color: var(--border2);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.case-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.015));
  pointer-events: none;
}
.case-card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}
.case-avatar {
  width: 44px;
  height: 44px;
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 900;
  flex-shrink: 0;
}
.mode-insurance .case-avatar { background: rgba(239,68,68,0.15); color: var(--red); }
.mode-private .case-avatar { background: rgba(59,130,246,0.15); color: var(--blue); }
.mode-tax .case-avatar { background: rgba(16,185,129,0.15); color: var(--green); }
.case-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.mode-insurance .case-badge { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.mode-private .case-badge { background: rgba(59,130,246,0.15); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); }
.mode-tax .case-badge { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
.case-name {
  font-size: 15px;
  font-weight: 800;
  color: var(--text);
  margin-bottom: 3px;
  line-height: 1.3;
}
.case-address {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.case-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.case-meta-item {
  font-size: 11px;
  color: var(--subtle);
  display: flex;
  align-items: center;
  gap: 5px;
}
.case-meta-item strong {
  color: var(--muted);
  font-weight: 600;
}
.progress-bar-wrap {
  margin-top: 14px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}
.progress-label span {
  font-size: 11px;
  color: var(--subtle);
  font-weight: 600;
}
.progress-label strong {
  font-size: 11px;
  color: var(--muted);
}
.progress-track {
  height: 4px;
  background: var(--surface3);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--accent3), var(--accent));
  transition: width 0.5s ease;
}
.progress-fill.low { background: linear-gradient(90deg, var(--red), #f97316); }
.progress-fill.mid { background: linear-gradient(90deg, #f97316, var(--accent)); }
.progress-fill.high { background: linear-gradient(90deg, var(--accent), var(--green)); }

/* ── CASE ACTIONS ── */
.case-actions {
  position: absolute;
  top: 14px;
  left: 14px;
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity 0.2s;
}
.case-card:hover .case-actions { opacity: 1; }
.action-btn {
  width: 28px;
  height: 28px;
  border-radius: 7px;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all 0.15s;
}
.action-btn:hover { color: var(--text); border-color: var(--muted); }
.action-btn.danger:hover { color: var(--red); border-color: var(--red); }

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  grid-column: 1/-1;
}
.empty-icon {
  font-size: 52px;
  margin-bottom: 16px;
  display: block;
  opacity: 0.5;
}
.empty-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 8px;
}
.empty-text {
  font-size: 13px;
  color: var(--subtle);
  margin-bottom: 24px;
}

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-pill {
  padding: 6px 16px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-pill:hover { border-color: var(--border2); color: var(--text); }
.filter-pill.active {
  border-color: var(--accent);
  background: rgba(245,158,11,0.1);
  color: var(--accent);
}
.search-box {
  position: relative;
  flex: 1;
  max-width: 280px;
}
.search-box input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px 8px 36px;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--subtle);
  font-size: 13px;
}

/* ── RECENT ACTIVITY ── */
.activity-list {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.activity-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  text-decoration: none;
}
.activity-item:last-child { border-bottom: none; }
.activity-item:hover { background: var(--surface3); }
.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.activity-info { flex: 1; min-width: 0; }
.activity-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.activity-detail {
  font-size: 11px;
  color: var(--subtle);
  margin-top: 2px;
}
.activity-time {
  font-size: 11px;
  color: var(--subtle);
  white-space: nowrap;
}
.activity-arrow {
  color: var(--subtle);
  font-size: 12px;
}

/* ── TWO COL LAYOUT ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 24px;
  align-items: start;
}
@media (max-width: 1100px) {
  .two-col { grid-template-columns: 1fr; }
}

/* ── SIDEBAR WIDGETS ── */
.widget {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px;
  margin-bottom: 16px;
}
.widget-title {
  font-size: 12px;
  font-weight: 800;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.mode-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.mode-row:last-child { border-bottom: none; }
.mode-row-label {
  font-size: 13px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 8px;
}
.mode-row-count {
  font-size: 16px;
  font-weight: 800;
}
.mini-bar {
  height: 3px;
  border-radius: 3px;
  margin-top: 4px;
  opacity: 0.7;
}

/* ── CONFIRM MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 28px;
  max-width: 380px;
  width: 90%;
  transform: scale(0.95);
  transition: transform 0.2s;
}
.modal-overlay.open .modal-box { transform: scale(1); }
.modal-title { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
.modal-text { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-start; }

/* ── NEW CASE MODAL ── */
.new-case-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.mode-choice {
  border: 2px solid var(--border2);
  border-radius: 10px;
  padding: 16px 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface3);
}
.mode-choice:hover { border-color: var(--muted); }
.mode-choice.sel-ins { border-color: var(--red); background: rgba(239,68,68,0.08); }
.mode-choice.sel-priv { border-color: var(--blue); background: rgba(59,130,246,0.08); }
.mode-choice.sel-tax { border-color: var(--green); background: rgba(16,185,129,0.08); }
.mode-choice-icon { font-size: 24px; display: block; margin-bottom: 6px; }
.mode-choice-label { font-size: 12px; font-weight: 700; color: var(--muted); }
.mode-choice.sel-ins .mode-choice-label { color: var(--red); }
.mode-choice.sel-priv .mode-choice-label { color: var(--blue); }
.mode-choice.sel-tax .mode-choice-label { color: var(--green); }

/* ── FOOTER ── */
footer {
  position: relative;
  z-index: 1;
  border-top: 1px solid var(--border);
  padding: 20px 32px;
  text-align: center;
  font-size: 11px;
  color: var(--subtle);
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.case-card { animation: fadeUp 0.3s ease both; }
.stat-card { animation: fadeUp 0.3s ease both; }

.badge-new {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: rgba(245,158,11,0.15);
  color: var(--accent);
  font-weight: 700;
  border: 1px solid rgba(245,158,11,0.3);
}
.pulse {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.7); }
}
</style>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword,
         createUserWithEmailAndPassword, signOut, sendPasswordResetEmail }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, collection, doc, setDoc, getDoc, getDocs,
         deleteDoc, query, where, orderBy, serverTimestamp, Timestamp }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAepqvT-NRxTiVemkaxNJWpyAQ9ibxrkcw",
  authDomain: "yaron-appraiser.firebaseapp.com",
  projectId: "yaron-appraiser",
  storageBucket: "yaron-appraiser.firebasestorage.app",
  messagingSenderId: "179370141848",
  appId: "1:179370141848:web:d5843d9641dce3adabc8ed"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

// ─── expose to global scope ───
window._FB = { auth, db, signInWithEmailAndPassword, signOut,
               createUserWithEmailAndPassword, sendPasswordResetEmail,
               onAuthStateChanged, collection, doc, setDoc, getDoc,
               getDocs, deleteDoc, query, where, orderBy, serverTimestamp };

// ─── Auth state listener ───
onAuthStateChanged(auth, async (user) => {
  if (user) {
    window._currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.body.style.overflow = '';
    // Load profile
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (snap.exists()) window._profile = snap.data();
    } catch(e){}
    await render();
  } else {
    window._currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
});

// ─── Login ───
window.doLogin = async function() {
  const email = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  const btn = document.querySelector('#loginScreen button');
  btn.textContent = 'מתחבר...';
  btn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    err.style.display = 'none';
  } catch(e) {
    err.textContent = 'אימייל או סיסמה שגויים';
    err.style.display = 'block';
    document.getElementById('loginPass').value = '';
  }
  btn.textContent = 'כניסה למערכת';
  btn.disabled = false;
};

// ─── Logout ───
window.doLogout = async function() {
  await signOut(auth);
};

// ─── Forgot password ───
window.doForgotPassword = async function() {
  const email = document.getElementById('loginUser').value.trim();
  if (!email) { alert('הכנס אימייל קודם'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    alert('נשלח מייל לאיפוס סיסמה אל ' + email);
  } catch(e) {
    alert('שגיאה: ' + e.message);
  }
};

// ─── Cases CRUD via Firestore ───
window._getCases = async function() {
  if (!window._currentUser) return [];
  try {
    const q = query(
      collection(db, 'cases'),
      where('uid', '==', window._currentUser.uid),
      orderBy('updatedAt', 'desc')
    );
    const snap = await getDocs(q);
    return snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch(e) { console.error('getCases error', e); return []; }
};

window._saveCase = async function(caseData) {
  if (!window._currentUser) return;
  const id = caseData.id;
  await setDoc(doc(db, 'cases', id), {
    ...caseData,
    uid: window._currentUser.uid,
    updatedAt: serverTimestamp()
  }, { merge: true });
};

window._deleteCase = async function(id) {
  await deleteDoc(doc(db, 'cases', id));
};

</script>
