<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>OMDAN | שגיאת תשלום</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:#030712;color:#f9fafb;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#111827;border:1px solid rgba(239,68,68,.3);border-radius:24px;padding:52px 40px;max-width:480px;width:100%;text-align:center;}
.icon{font-size:64px;margin-bottom:20px;}
h1{font-size:28px;font-weight:900;margin-bottom:10px;}
.sub{font-size:15px;color:#9ca3af;margin-bottom:32px;line-height:1.7;}
.btn{display:inline-block;padding:13px 30px;border-radius:12px;text-decoration:none;font-weight:800;font-size:14px;font-family:'Heebo',sans-serif;cursor:pointer;border:none;}
.btn-primary{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000;}
.btn-ghost{background:transparent;border:1px solid #374151;color:#9ca3af;}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.note{margin-top:24px;font-size:12px;color:#6b7280;line-height:1.7;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">❌</div>
  <h1>התשלום לא הושלם</h1>
  <p class="sub">התשלום נכשל או בוטל.<br>לא חויב כרטיס האשראי שלך.</p>
  <div class="actions">
    <a href="pricing.html" class="btn btn-primary">נסה שוב</a>
    <a href="index.html" class="btn btn-ghost">חזרה למערכת</a>
  </div>
  <p class="note">
    אם נתקלת בבעיה טכנית — שלח מייל לתמיכה<br>
    או פנה ישירות דרך ממשק המערכת
  </p>
</div>
</body>
</html>
