<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ירון אמיר | מערכת שמאות | טופס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#111827;--primary2:#1F2937;--primary3:#374151;
  --accent:#F59E0B;--accent2:#FDE68A;--accent3:#D97706;
  --blue:#3B82F6;--red:#EF4444;--green:#10B981;--purple:#8B5CF6;
  --text:#F9FAFB;--muted:#9CA3AF;--subtle:#6B7280;--border:#1F2937;
  --card:#111827;--bg:#030712;
  --shadow:0 4px 20px rgba(0,0,0,0.4);
  summary:{openingOverride:'',appraisalNotes:'',explanations:'',recommendations:'',signature:'',claimTotal:'',rehabTime:'',rehabNotes:''}
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}

/* ── UTILITIES ── */
.hidden{display:none!important;}
.flex{display:flex;}.flex-col{flex-direction:column;}.gap4{gap:4px;}.gap8{gap:8px;}.gap12{gap:12px;}.gap16{gap:16px;}.gap20{gap:20px;}
.items-center{align-items:center;}.justify-between{justify-content:space-between;}.flex-wrap{flex-wrap:wrap;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.span2{grid-column:1/-1;}
.w100{width:100%;}.ta-r{text-align:right;}.ta-l{text-align:left;}.ta-c{text-align:center;}
.fw7{font-weight:700;}.fw8{font-weight:800;}.fw9{font-weight:900;}
.fs11{font-size:11px;}.fs12{font-size:12px;}.fs13{font-size:13px;}.fs14{font-size:14px;}.fs16{font-size:16px;}.fs20{font-size:20px;}.fs24{font-size:24px;}
.c-muted{color:var(--muted);}.c-subtle{color:var(--subtle);}.c-accent{color:var(--accent);}.c-blue{color:var(--blue);}.c-green{color:var(--green);}.c-red{color:var(--red);}
.mt4{margin-top:4px;}.mt8{margin-top:8px;}.mt12{margin-top:12px;}.mt16{margin-top:16px;}.mt20{margin-top:20px;}
.mb8{margin-bottom:8px;}.mb12{margin-bottom:12px;}.mb16{margin-bottom:16px;}
.p12{padding:12px;}.p16{padding:16px;}.p20{padding:20px;}
.rounded8{border-radius:8px;}.rounded12{border-radius:12px;}.rounded16{border-radius:16px;}
.divider{height:1px;background:var(--primary3);margin:16px 0;}
.label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px;}
.note{font-size:12px;color:var(--subtle);padding:8px 12px;background:#1F293780;border-radius:6px;border-right:3px solid var(--accent);margin-top:8px;}
.note-blue{border-right-color:var(--blue);background:#3B82F610;}
.note-red{border-right-color:var(--red);background:#EF444410;}
.note-green{border-right-color:var(--green);background:#10B98110;}

/* ── FORM INPUTS ── */
input[type=text],input[type=number],input[type=tel],input[type=email],input[type=date],input[type=time],select,textarea{
  background:var(--primary2);border:1.5px solid var(--primary3);border-radius:var(--r);
  padding:10px 14px;color:var(--text);font-size:13px;font-family:'Heebo',sans-serif;
  outline:none;width:100%;transition:border-color .2s,box-shadow .2s;
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(245,158,11,.12);}
select{cursor:pointer;}
select option{background:var(--primary2);}
textarea{resize:vertical;min-height:80px;}
.field{display:flex;flex-direction:column;gap:5px;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:var(--r);
  cursor:pointer;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;transition:all .18s;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#111;box-shadow:0 3px 12px rgba(245,158,11,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(245,158,11,.4);}
.btn-secondary{background:var(--primary2);border:1px solid var(--primary3);color:var(--text);}
.btn-secondary:hover{border-color:var(--muted);}
.btn-ghost{background:transparent;border:1px solid var(--primary3);color:var(--muted);}
.btn-ghost:hover{color:var(--text);border-color:var(--muted);}
.btn-danger{background:#EF444420;border:1px solid #EF4444;color:#EF4444;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-xs{padding:4px 8px;font-size:11px;border-radius:6px;}

/* ── RADIO PILLS ── */
.pill-group{display:flex;flex-wrap:wrap;gap:6px;}
.pill{padding:7px 15px;border-radius:20px;border:1.5px solid var(--primary3);background:var(--primary2);
  color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.pill:hover{border-color:var(--muted);}
.pill.active{border-color:var(--accent);background:rgba(245,158,11,.12);color:var(--accent);}
.pill.active-blue{border-color:var(--blue);background:rgba(59,130,246,.1);color:var(--blue);}
.pill.active-green{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green);}
.pill.active-red{border-color:var(--red);background:rgba(239,68,68,.1);color:var(--red);}

/* ── CHECK CHIPS ── */
.chip{padding:6px 13px;border-radius:16px;border:1.5px solid var(--primary3);background:var(--primary2);
  color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px;}
.chip:hover{border-color:var(--muted);}
.chip.checked{border-color:var(--green);background:rgba(16,185,129,.1);color:var(--green);}

/* ── EVENT CARDS ── */
.event-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;}
.event-card{border:2px solid var(--primary3);border-radius:12px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;background:var(--primary2);}
.event-card:hover{border-color:var(--muted);}
.event-card.active{border-color:var(--accent);background:rgba(245,158,11,.08);}
.event-card .ei{font-size:26px;margin-bottom:7px;}
.event-card .el{font-size:12px;font-weight:700;color:var(--muted);}
.event-card.active .el{color:var(--accent);}

/* ── SECTION CARD ── */
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;}
.sc-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid var(--border);}
.sc-head:hover{background:var(--primary2);}
.sc-title{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;}
.sc-body{padding:18px;}
.sc-toggle{color:var(--subtle);transition:transform .2s;}
.sc.collapsed .sc-body{display:none;}
.sc.collapsed .sc-toggle{transform:rotate(-90deg);}

/* ── LANDING ── */
#landing{position:fixed;inset:0;background:linear-gradient(135deg,#020812,#0D1117 50%,#060C18);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:32px 20px;}
.land-title{font-size:40px;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:8px;}
.land-sub{color:var(--subtle);font-size:15px;text-align:center;margin-bottom:48px;}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;max-width:860px;width:100%;}
.mode-card{background:rgba(255,255,255,.03);border:2px solid rgba(255,255,255,.07);border-radius:18px;
  padding:28px 22px;cursor:pointer;text-align:right;transition:all .25s;position:relative;overflow:hidden;}
.mode-card::before{content:'';position:absolute;inset:0;border-radius:18px;opacity:0;transition:opacity .25s;}
.mode-card:hover::before{opacity:1;}
.mode-card.pm::before{background:radial-gradient(circle at 30% 30%,rgba(59,130,246,.1),transparent 60%);}
.mode-card.im::before{background:radial-gradient(circle at 30% 30%,rgba(239,68,68,.1),transparent 60%);}
.mode-card.tm::before{background:radial-gradient(circle at 30% 30%,rgba(16,185,129,.1),transparent 60%);}
.mode-card:hover{transform:translateY(-4px);}
.mode-card.pm:hover{border-color:var(--blue);box-shadow:0 16px 50px rgba(59,130,246,.2);}
.mode-card.im:hover{border-color:var(--red);box-shadow:0 16px 50px rgba(239,68,68,.2);}
.mode-card.tm:hover{border-color:var(--green);box-shadow:0 16px 50px rgba(16,185,129,.2);}
.mode-icon{font-size:38px;margin-bottom:14px;display:block;}
.mode-name{font-size:18px;font-weight:800;color:var(--text);margin-bottom:4px;}
.mode-tag{font-size:12px;font-weight:700;margin-bottom:12px;}
.mode-desc{font-size:12px;color:var(--subtle);line-height:1.6;}
.mode-cta{margin-top:18px;display:flex;justify-content:flex-start;}
.mode-cta span{padding:7px 18px;border-radius:18px;font-size:12px;font-weight:700;color:#111;}

/* ── TOP BAR ── */
#topbar{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:11px 24px;display:flex;align-items:center;justify-content:space-between;}
.tb-left{display:flex;align-items:center;gap:12px;}
.tb-logo{font-size:20px;}
.tb-name{font-size:15px;font-weight:800;color:var(--text);}
.tb-mode{padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;}
.tb-right{display:flex;gap:8px;}

/* ── SIDEBAR ── */
#layout{display:flex;min-height:calc(100vh - 51px);}
#sidebar{width:210px;background:rgba(15,23,42,.8);border-left:1px solid var(--border);padding:16px 10px;flex-shrink:0;position:sticky;top:51px;height:calc(100vh - 51px);overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;margin-bottom:3px;transition:all .18s;border-right:3px solid transparent;}
.nav-item:hover{background:var(--primary2);}
.nav-item.active{background:rgba(245,158,11,.08);border-right-color:var(--accent);}
.nav-item .ni{font-size:16px;}
.nav-item .nt{font-size:12px;font-weight:700;}.nav-item.active .nt{color:var(--accent);}
.nav-item .ns{font-size:10px;color:var(--subtle);}

/* ── MAIN ── */
#main{flex:1;padding:28px 32px;overflow-y:auto;}
#main .page-title{font-size:22px;font-weight:900;margin-bottom:4px;}
#main .page-sub{font-size:13px;color:var(--subtle);margin-bottom:22px;}
.card-nav{display:flex;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}

/* ── AREA CARDS (FINDINGS) ── */
.area-card{background:rgba(15,23,42,.8);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;overflow:hidden;}
.area-head{background:var(--primary2);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.area-title{font-size:13px;font-weight:700;}
.area-sqm{width:70px;background:var(--primary3);border:none;border-radius:6px;padding:4px 8px;color:var(--text);font-size:12px;text-align:left;}
.area-body{padding:16px;}

/* ── SIGN CHIPS ── */
.sign-group{margin-bottom:14px;}
.sign-group-label{font-size:10px;font-weight:800;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.sign-chip{padding:5px 11px;border-radius:14px;border:1.5px solid var(--primary3);background:transparent;
  color:var(--muted);font-size:11px;cursor:pointer;transition:all .14s;display:inline-block;margin:3px 3px 0 0;}
.sign-chip:hover{border-color:var(--muted);}
.sign-chip.on{border-color:var(--accent);background:rgba(245,158,11,.1);color:var(--accent);}

/* ── BOQ TABLE ── */
.boq-section{margin-bottom:20px;}
.boq-section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;border-radius:6px;margin-bottom:8px;}
.boq-table{width:100%;border-collapse:collapse;font-size:12px;}
.boq-table th{background:var(--primary2);padding:8px 10px;text-align:right;font-weight:700;color:var(--muted);font-size:11px;border-bottom:2px solid var(--primary3);}
.boq-table th.ta-l,.boq-table td.ta-l{text-align:left;}
.boq-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.boq-table tr:hover td{background:rgba(255,255,255,.02);}
.boq-table .row-subtotal td{background:var(--primary2);font-weight:800;}
.boq-table .row-zero td{color:var(--subtle)!important;}
.boq-input{background:var(--primary2);border:1px solid transparent;border-radius:4px;padding:3px 6px;color:var(--text);font-size:12px;font-family:'Heebo',sans-serif;width:100%;outline:none;}
.boq-input:focus{border-color:var(--accent);}
.boq-input.num{text-align:left;width:80px;}
.boq-total-box{background:rgba(15,23,42,.9);border:2px solid rgba(245,158,11,.25);border-radius:12px;padding:18px 20px;margin-top:16px;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;}
.total-row+.total-row{border-top:1px solid var(--border);}
.total-row.grand{padding-top:12px;margin-top:4px;}
.del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:2px 4px;opacity:.5;transition:opacity .15s;}
.del-btn:hover{opacity:1;}

/* ── SUMMARY / REPORT ── */
#reportView{display:none;background:#F9FAFB;min-height:100vh;color:#111;font-family:'Heebo',sans-serif;}
#reportView *{box-sizing:border-box;}
.rpt-topbar{background:#fff;border-bottom:2px solid #E5E7EB;padding:11px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.rpt-body{max-width:820px;margin:0 auto;padding:40px 24px;}
.rpt-header{text-align:center;border-bottom:3px solid #1F2937;padding-bottom:24px;margin-bottom:32px;}
.rpt-header h1{font-size:26px;font-weight:900;color:#111;margin-bottom:4px;}
.rpt-header h2{font-size:16px;font-weight:600;color:#6B7280;}
.rpt-section{margin-bottom:28px;}
.rpt-section h3{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:#374151;border-bottom:2px solid #E5E7EB;padding-bottom:6px;margin-bottom:12px;}
.rpt-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:6px;}
.rpt-table th{background:#F3F4F6;padding:8px 10px;text-align:right;font-weight:700;color:#6B7280;font-size:11px;}
.rpt-table td{padding:7px 10px;border-bottom:1px solid #F3F4F6;}
.rpt-table .st{background:#F9FAFB;border-top:2px solid #E5E7EB;font-weight:800;}
.rpt-summary-box{background:#F9FAFB;border:2px solid #1F2937;border-radius:8px;padding:18px;margin-top:12px;}
.rpt-summary-row{display:flex;justify-content:space-between;padding:5px 0;font-size:14px;}
.rpt-summary-row+.rpt-summary-row{border-top:1px solid #E5E7EB;}
.rpt-signature{border-top:2px solid #1F2937;padding-top:24px;margin-top:32px;text-align:center;color:#6B7280;font-size:12px;}
.rpt-p{line-height:1.9;font-size:14px;color:#374151;}

/* ── PREVIEW BOX ── */
.preview-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:12px;}
.preview-box .pb-label{font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;margin-bottom:6px;}
.preview-box .pb-text{font-size:12px;color:#D1D5DB;line-height:1.8;white-space:pre-wrap;}

@media(max-width:768px){
  #sidebar{display:none;}
  .grid2,.grid3{grid-template-columns:1fr;}
  .event-grid{grid-template-columns:repeat(2,1fr);}
  #main{padding:16px;}
}
@media print{
  #appShell{display:none!important;}
  #reportView{display:block!important;}
  .rpt-topbar{display:none!important;}
  .rpt-body{padding:20px;}
}

/* ── PROGRESS BAR ── */
.progress-wrap{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.progress-bar{width:80px;height:6px;background:var(--primary2);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}

/* ── CASE MANAGER ── */
#caseMgr{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.7);display:none;align-items:flex-start;justify-content:center;padding-top:60px;}
#caseMgr.open{display:flex;}
.cm-panel{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;max-width:560px;max-height:80vh;overflow-y:auto;padding:24px;}
.cm-title{font-size:18px;font-weight:800;margin-bottom:4px;}
.cm-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.cm-case-row{display:flex;align-items:center;gap:10px;padding:12px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:background .15s;}
.cm-case-row:hover{background:var(--primary2);}
.cm-case-row.active-case{border-color:var(--accent);background:rgba(245,158,11,.07);}
.cm-case-name{font-weight:700;font-size:13px;}
.cm-case-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.cm-case-actions{margin-right:auto;display:flex;gap:6px;}

/* ── PHOTO SECTION ── */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:12px;}
.photo-thumb{position:relative;border-radius:10px;overflow:hidden;background:var(--primary2);border:1px solid var(--border);aspect-ratio:4/3;}
.photo-thumb img{width:100%;height:100%;object-fit:cover;}
.photo-thumb .photo-del{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:24px;height:24px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;}
.photo-add-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;border:2px dashed var(--primary3);padding:20px;cursor:pointer;font-size:12px;color:var(--muted);gap:6px;transition:border-color .15s;}
.photo-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.photo-caption{margin-top:6px;}
.photo-caption input{width:100%;font-size:11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);}

/* ── MOBILE FIELD MODE ── */
body.field-mode #sidebar{display:none;}
body.field-mode .card-container{padding:12px;}
body.field-mode .btn{min-height:44px;font-size:15px;}
body.field-mode input,body.field-mode select,body.field-mode textarea{font-size:16px!important;}
body.field-mode .ns{display:none;}
body.field-mode #main{padding:12px;}

/* ── UNDERINSURANCE BADGE ── */
.under-badge{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;margin-top:8px;}
.under-ok{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3);}
.under-warn{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.3);}

/* ── EXPLANATIONS ── */
.expl-auto{background:var(--bg);border:1px solid rgba(245,158,11,.25);border-radius:10px;padding:14px;margin-bottom:12px;}
.expl-item{font-size:12px;color:#D1D5DB;line-height:1.9;margin-bottom:4px;}
.expl-item strong{color:var(--accent);}

/* ── GENERAL ITEMS (BOQ checkboxes) ── */
.gen-items-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.gen-item-cb{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:12px;background:var(--primary2);}
.gen-item-cb input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);}
.gen-item-cb.checked{border-color:var(--accent);background:rgba(245,158,11,.08);}
</style>
